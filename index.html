<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fun Zone</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      font-family: 'Space Grotesk', system-ui, sans-serif;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
      cursor: none;
    }

    canvas {
      position: fixed;
      inset: 0;
      z-index: 0;
    }

    #ui {
      position: fixed;
      z-index: 10;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      text-align: center;
      pointer-events: none;
      transition: opacity 0.6s ease;
    }

    #ui h1 {
      font-size: clamp(3rem, 10vw, 8rem);
      font-weight: 900;
      line-height: 1;
      background: linear-gradient(135deg, #ff6ec7, #ffd700, #00e5ff, #a259ff);
      background-size: 300% 300%;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: gradShift 4s ease infinite;
      letter-spacing: -2px;
    }

    #ui p {
      font-size: clamp(0.9rem, 2vw, 1.2rem);
      color: rgba(255,255,255,0.45);
      margin-top: 0.6rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    @keyframes gradShift {
      0%   { background-position: 0% 50%; }
      50%  { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    #mode-panel {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 12px;
      z-index: 10;
      pointer-events: all;
    }

    .mode-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      color: rgba(255,255,255,0.7);
      padding: 8px 20px;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s ease;
      backdrop-filter: blur(10px);
    }

    .mode-btn:hover, .mode-btn.active {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
      color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }

    .mode-btn.active {
      border-color: #ff6ec7;
      color: #ff6ec7;
    }

    #cursor {
      position: fixed;
      width: 16px;
      height: 16px;
      border-radius: 50%;
      background: white;
      mix-blend-mode: difference;
      pointer-events: none;
      z-index: 999;
      transform: translate(-50%, -50%);
      transition: transform 0.1s ease, width 0.2s, height 0.2s;
    }

    #cursor.big {
      width: 48px;
      height: 48px;
    }

    #score {
      position: fixed;
      top: 20px;
      right: 24px;
      z-index: 10;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 0.05em;
      display: none;
    }

    #score span {
      color: #ffd700;
      font-weight: 700;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<canvas id="c"></canvas>

<div id="cursor"></div>

<div id="ui">
  <h1>FUN ZONE</h1>
  <p>Move your cursor &mdash; click to explode</p>
</div>

<div id="score">particles popped: <span id="popcount">0</span></div>

<div id="mode-panel">
  <button class="mode-btn active" data-mode="fireworks">Fireworks</button>
  <button class="mode-btn" data-mode="gravity">Gravity</button>
  <button class="mode-btn" data-mode="vortex">Vortex</button>
  <button class="mode-btn" data-mode="confetti">Confetti</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const cursor = document.getElementById('cursor');
const popCountEl = document.getElementById('popcount');
const scoreEl = document.getElementById('score');
const ui = document.getElementById('ui');

let W = canvas.width = window.innerWidth;
let H = canvas.height = window.innerHeight;
let mouse = { x: W/2, y: H/2 };
let particles = [];
let mode = 'fireworks';
let popCount = 0;
let frame = 0;
let uiHidden = false;

window.addEventListener('resize', () => {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
});

window.addEventListener('mousemove', (e) => {
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
  if (!uiHidden) {
    uiHidden = true;
    ui.style.opacity = '0';
    scoreEl.style.display = 'block';
  }
});

window.addEventListener('click', (e) => {
  explode(e.clientX, e.clientY, 60);
});

cursor.addEventListener('mouseenter', () => cursor.classList.add('big'));
cursor.addEventListener('mouseleave', () => cursor.classList.remove('big'));

document.querySelectorAll('.mode-btn').forEach(btn => {
  btn.addEventListener('click', (e) => {
    e.stopPropagation();
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    particles = [];
  });
  btn.addEventListener('mouseenter', () => cursor.classList.add('big'));
  btn.addEventListener('mouseleave', () => cursor.classList.remove('big'));
});

const palette = [
  '#ff6ec7','#ffd700','#00e5ff','#a259ff',
  '#ff4040','#40ff80','#ff8c00','#00ffcc',
  '#ff1493','#7fff00','#1e90ff','#ff69b4'
];

function rand(a, b) { return Math.random() * (b - a) + a; }
function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function explode(x, y, count = 40) {
  for (let i = 0; i < count; i++) {
    const angle = rand(0, Math.PI * 2);
    const speed = rand(2, mode === 'fireworks' ? 12 : 8);
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - (mode === 'fireworks' ? rand(2, 6) : 0),
      size: rand(3, mode === 'confetti' ? 12 : 7),
      color: pick(palette),
      alpha: 1,
      decay: rand(0.012, 0.025),
      rotation: rand(0, Math.PI * 2),
      rotSpeed: rand(-0.15, 0.15),
      isRect: mode === 'confetti' && Math.random() > 0.4,
      life: 1,
      trail: [],
    });
  }
  popCount += count;
  popCountEl.textContent = popCount.toLocaleString();
}

let spawnTimer = 0;
function spawnAmbient() {
  if (mode === 'fireworks' && frame % 90 === 0) {
    explode(rand(W * 0.1, W * 0.9), rand(H * 0.2, H * 0.6), 25);
  }
  if (mode === 'confetti') {
    for (let i = 0; i < 3; i++) {
      particles.push({
        x: rand(0, W), y: -10,
        vx: rand(-1.5, 1.5),
        vy: rand(1.5, 4),
        size: rand(6, 14),
        color: pick(palette),
        alpha: 1,
        decay: rand(0.003, 0.007),
        rotation: rand(0, Math.PI * 2),
        rotSpeed: rand(-0.12, 0.12),
        isRect: Math.random() > 0.3,
        life: 1,
        trail: [],
      });
    }
  }
  if (mode === 'gravity' && frame % 4 === 0) {
    particles.push({
      x: mouse.x + rand(-30, 30),
      y: mouse.y + rand(-30, 30),
      vx: rand(-2, 2),
      vy: rand(-4, -1),
      size: rand(4, 10),
      color: pick(palette),
      alpha: 1,
      decay: rand(0.008, 0.018),
      rotation: 0,
      rotSpeed: rand(-0.1, 0.1),
      isRect: false,
      life: 1,
      trail: [],
    });
  }
  if (mode === 'vortex' && frame % 2 === 0) {
    const angle = frame * 0.18;
    const r = rand(60, 180);
    particles.push({
      x: mouse.x + Math.cos(angle) * r,
      y: mouse.y + Math.sin(angle) * r,
      vx: Math.cos(angle + Math.PI/2) * rand(2, 5),
      vy: Math.sin(angle + Math.PI/2) * rand(2, 5),
      size: rand(3, 8),
      color: pick(palette),
      alpha: 1,
      decay: rand(0.01, 0.02),
      rotation: 0,
      rotSpeed: rand(-0.2, 0.2),
      isRect: false,
      life: 1,
      trail: [],
    });
  }
}

function update(p) {
  p.trail.push({ x: p.x, y: p.y, alpha: p.alpha });
  if (p.trail.length > 8) p.trail.shift();

  if (mode === 'gravity' || mode === 'confetti') {
    p.vy += 0.18;
    p.vx *= 0.99;
  }
  if (mode === 'fireworks') {
    p.vy += 0.12;
    p.vx *= 0.98;
    p.vy *= 0.98;
  }
  if (mode === 'vortex') {
    const dx = p.x - mouse.x;
    const dy = p.y - mouse.y;
    const dist = Math.sqrt(dx*dx + dy*dy) || 1;
    p.vx += (-dy / dist) * 0.3 - dx / dist * 0.05;
    p.vy += (dx / dist) * 0.3 - dy / dist * 0.05;
    p.vx *= 0.97;
    p.vy *= 0.97;
  }

  p.x += p.vx;
  p.y += p.vy;
  p.rotation += p.rotSpeed;
  p.alpha -= p.decay;
  p.life -= p.decay;
}

function draw(p) {
  // draw trail
  for (let i = 0; i < p.trail.length; i++) {
    const t = p.trail[i];
    const ratio = i / p.trail.length;
    ctx.globalAlpha = t.alpha * ratio * 0.3;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(t.x, t.y, p.size * ratio * 0.5, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.globalAlpha = Math.max(0, p.alpha);
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rotation);

  if (p.isRect) {
    ctx.fillStyle = p.color;
    ctx.fillRect(-p.size / 2, -p.size * 0.4, p.size, p.size * 0.8);
  } else {
    // glowing circle
    const grad = ctx.createRadialGradient(0, 0, 0, 0, 0, p.size);
    grad.addColorStop(0, p.color);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(0, 0, p.size, 0, Math.PI * 2);
    ctx.fill();
  }

  ctx.restore();
  ctx.globalAlpha = 1;
}

function loop() {
  frame++;
  ctx.fillStyle = 'rgba(10, 10, 15, 0.18)';
  ctx.fillRect(0, 0, W, H);

  spawnAmbient();

  for (let i = particles.length - 1; i >= 0; i--) {
    update(particles[i]);
    if (particles[i].alpha <= 0 || particles[i].x < -100 || particles[i].x > W + 100 || particles[i].y > H + 100) {
      particles.splice(i, 1);
    } else {
      draw(particles[i]);
    }
  }

  // cap particle count
  if (particles.length > 3000) {
    particles.splice(0, particles.length - 3000);
  }

  requestAnimationFrame(loop);
}

// Initial burst
setTimeout(() => explode(W/2, H/2, 80), 300);

loop();
</script>
</body>
</html>
